name: CI

on:
  pull_request:
    branches:
      - main
      - Docker

jobs:
  python-check:
    name: Python smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Docker_Assignment/docker/requirements.txt

      - name: Install dependencies
        working-directory: Docker_Assignment/docker
        run: pip install -r requirements.txt

      - name: Verify Python syntax
        working-directory: Docker_Assignment/docker
        run: python -m py_compile main.py

      - name: Run application smoke test
        working-directory: Docker_Assignment/docker
        run: python main.py

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: Docker_Assignment/docker
          file: Docker_Assignment/docker/Dockerfile
          push: false
          tags: capstone-app:ci
