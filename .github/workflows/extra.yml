name: GitHub Action

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Docker_Assignment/docker/requirements.txt

      - name: Validate Python syntax
        run: python -m py_compile Docker_Assignment/docker/main.py

      - name: Verify Python dependencies
        run: python -c "import requests, numpy; print('Dependencies OK')"
